<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stoo's Cards - Marketplace Pokémon TCG</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- NAVIGATION -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <h1>Stoo's Cards</h1>
            </div>
            <div class="nav-center">
                <input type="text" class="search-input" id="searchInput" placeholder="Rechercher une carte...">
                <select id="typeFilter" class="filter-select">
                    <option value="">Tous types</option>
                    <option value="feu">Feu</option>
                    <option value="eau">Eau</option>
                    <option value="plante">Plante</option>
                    <option value="electrique">Électrique</option>
                    <option value="psychique">Psychique</option>
                    <option value="combat">Combat</option>
                    <option value="poison">Poison</option>
                    <option value="sol">Sol</option>
                    <option value="vol">Vol</option>
                    <option value="insecte">Insecte</option>
                    <option value="roche">Roche</option>
                    <option value="fantome">Fantôme</option>
                    <option value="metal">Métal</option>
                    <option value="fee">Fée</option>
                    <option value="dragon">Dragon</option>
                    <option value="tenebres">Ténèbres</option>
                    <option value="incolore">Incolore</option>
                </select>
                <select id="rarityFilter" class="filter-select">
                    <option value="">Toutes raretés</option>
                    <option value="commune">Commune</option>
                    <option value="peu-commune">Peu commune</option>
                    <option value="rare">Rare</option>
                    <option value="holoRare">Holo rare</option>
                    <option value="ex">EX</option>
                    <option value="gx">GX</option>
                    <option value="v">V</option>
                    <option value="vmax">VMAX</option>
                    <option value="vstar">VSTAR</option>
                </select>
            </div>
            <div class="nav-right">
                <button id="commanderBtn" class="btn-nav">📦 Commandes</button>
                <button id="boosterBtn" class="btn-nav">🎁 Boosters</button>
                <button id="addCardBtn" class="btn-add">+ Ajouter</button>
            </div>
        </div>
    </nav>

    <!-- HERO SECTION -->
    <section class="hero">
        <div class="hero-content">
            <h2>Bienvenue dans l'univers des cartes rares</h2>
            <p>Découvrez, collectionnez et échangez les meilleures cartes Pokémon TCG</p>
        </div>
    </section>

    <!-- TOP CARD OF THE WEEK -->
    <section class="top-card-section">
        <div class="container">
            <h3>✨ Carte de la semaine</h3>
            <div id="topCard" class="top-card-container">
                <div class="skeleton-card"></div>
            </div>
        </div>
    </section>

    <!-- GALERIE DE CARTES -->
    <section class="gallery">
        <div class="container">
            <div id="cardsGrid" class="cards-grid">
                <!-- Les cartes s'affichent ici dynamiquement -->
            </div>
        </div>
    </section>

    <!-- ADMIN PANEL (caché par défaut) -->
    <div id="adminModal" class="modal hidden">
        <div class="modal-content">
            <button class="close-btn">&times;</button>
            <h2>Ajouter une nouvelle carte</h2>
            
            <form id="cardForm">
                <div class="form-group">
                    <label>Nom de la carte</label>
                    <input type="text" id="cardName" required>
                </div>

                <div class="form-group">
                    <label>Dresseur (Type de créature)</label>
                    <input type="text" id="cardDresseur" required>
                </div>

                <div class="form-group">
                    <label>Type</label>
                    <select id="cardType" required>
                        <option value="">Choisir un type</option>
                        <option value="feu">Feu</option>
                        <option value="eau">Eau</option>
                        <option value="plante">Plante</option>
                        <option value="electrique">Électrique</option>
                        <option value="psychique">Psychique</option>
                        <option value="combat">Combat</option>
                        <option value="poison">Poison</option>
                        <option value="sol">Sol</option>
                        <option value="vol">Vol</option>
                        <option value="insecte">Insecte</option>
                        <option value="roche">Roche</option>
                        <option value="fantome">Fantôme</option>
                        <option value="metal">Métal</option>
                        <option value="fee">Fée</option>
                        <option value="dragon">Dragon</option>
                        <option value="tenebres">Ténèbres</option>
                        <option value="incolore">Incolore</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Rareté</label>
                    <select id="cardRarity" required>
                        <option value="">Choisir une rareté</option>
                        <option value="commune">Commune</option>
                        <option value="peu-commune">Peu commune</option>
                        <option value="rare">Rare</option>
                        <option value="holoRare">Holo rare</option>
                        <option value="ex">EX</option>
                        <option value="gx">GX</option>
                        <option value="v">V</option>
                        <option value="vmax">VMAX</option>
                        <option value="vstar">VSTAR</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>PV (Points de Vie)</label>
                    <input type="number" id="cardPV" required>
                </div>

                <div class="form-group">
                    <label>Prix (€)</label>
                    <input type="number" id="cardPrice" step="0.01" required>
                </div>

                <div class="form-group">
                    <label>Image de la carte</label>
                    <input type="file" id="cardImage" accept="image/*" required>
                    <div id="imagePreview" class="image-preview"></div>
                </div>

                <div class="form-group">
                    <label>Description</label>
                    <textarea id="cardDescription"></textarea>
                </div>

                <button type="submit" class="btn-submit">Ajouter la carte</button>
            </form>
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="footer">
        <p>&copy; 2025 Stoo's Cards. Tous droits réservés.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.4/dist/module.js"></script>
    <script src="app.js"></script>
</body>
</html>
