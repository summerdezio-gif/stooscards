<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon TCG Vault - Mythic Collection</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 🎯 NAVBAR -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <span class="logo-icon">⚡</span>
                <span class="logo-text">MYTHIC VAULT</span>
            </div>
            
            <div class="nav-links">
                <a href="#" class="nav-link active" data-filter="all">Gallery</a>
                <a href="#" class="nav-link" data-filter="favorites">❤️ Favoris</a>
                <a href="#" class="nav-link" id="cart-link">🛒 Panier</a>
                <a href="#" class="nav-link" id="admin-toggle">⚙️ Admin</a>
            </div>
        </div>
    </nav>

    <!-- 🎨 HERO SECTION -->
    <section class="hero">
        <div class="hero-content">
            <h1 class="hero-title">POKÉMON TCG</h1>
            <p class="hero-subtitle">Mythic Vault - Rare & Legendary Collection</p>
        </div>
    </section>

    <!-- 🔍 SEARCH & FILTERS -->
    <section class="filters-section">
        <div class="search-box">
            <input 
                type="text" 
                id="searchInput" 
                class="search-input" 
                placeholder="Rechercher une carte..."
            >
            <span class="search-icon">🔍</span>
        </div>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">Toutes</button>
            <button class="filter-btn" data-filter="pokemon">Pokémon</button>
            <button class="filter-btn" data-filter="trainer">Trainer</button>
            <button class="filter-btn" data-filter="energy">Energie</button>
            <button class="filter-btn" data-filter="rare">Rare</button>
        </div>
    </section>

    <!-- 📦 GALLERY MAIN -->
    <main class="gallery-container">
        <div class="cards-grid" id="cardsGrid">
            <!-- Cartes générées par JS -->
        </div>
    </main>

    <!-- 💫 MODAL DÉTAIL CARTE -->
    <div class="modal" id="cardModal">
        <div class="modal-content">
            <button class="modal-close">&times;</button>
            <div class="modal-body">
                <div class="modal-image">
                    <img id="modalImage" src="" alt="">
                </div>
                <div class="modal-info">
                    <h2 id="modalName"></h2>
                    <p id="modalType" class="modal-type"></p>
                    <p id="modalDesc" class="modal-description"></p>
                    <div class="modal-meta">
                        <span id="modalRarity" class="rarity-badge"></span>
                        <span id="modalPrice" class="price"></span>
                    </div>
                    <button class="btn-primary" id="addToCartBtn">Ajouter au panier</button>
                    <button class="btn-secondary" id="toggleFavBtn">❤️ Ajouter aux favoris</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 🛒 PANIER SIDEBAR -->
    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h3>Panier</h3>
            <button class="close-cart">&times;</button>
        </div>
        <div class="cart-items" id="cartItems"></div>
        <div class="cart-footer">
            <div class="cart-total">
                <strong>Total:</strong>
                <span id="cartTotal">0€</span>
            </div>
            <button class="btn-primary" id="checkoutBtn">Valider</button>
        </div>
    </div>

    <!-- ⚙️ ADMIN PANEL -->
    <div class="admin-panel" id="adminPanel">
        <div class="admin-header">
            <h2>Admin Panel</h2>
            <button class="admin-close">&times;</button>
        </div>

        <div class="admin-tabs">
            <button class="admin-tab active" data-tab="add">➕ Ajouter Carte</button>
            <button class="admin-tab" data-tab="manage">📋 Gérer</button>
        </div>

        <!-- Tab: Ajouter -->
        <div class="admin-content active" id="addCardTab">
            <form id="addCardForm" class="admin-form">
                <input type="text" id="cardName" placeholder="Nom de la carte" required>
                <select id="cardType" required>
                    <option value="">Type...</option>
                    <option value="pokemon">Pokémon</option>
                    <option value="trainer">Trainer</option>
                    <option value="energy">Energie</option>
                </select>
                <select id="cardRarity" required>
                    <option value="">Rareté...</option>
                    <option value="common">Commune</option>
                    <option value="uncommon">Peu courante</option>
                    <option value="rare">Rare</option>
                    <option value="legendary">Légendaire</option>
                </select>
                <input type="number" id="cardPrice" placeholder="Prix (€)" step="0.01" required>
                <textarea id="cardDesc" placeholder="Description..." rows="3"></textarea>
                <input type="file" id="cardImage" accept="image/*" required>
                <button type="submit" class="btn-primary">Ajouter la carte</button>
            </form>
        </div>

        <!-- Tab: Gérer -->
        <div class="admin-content" id="manageCardTab">
            <div class="admin-list" id="adminList"></div>
        </div>
    </div>

    <!-- 🎯 Overlay -->
    <div class="overlay" id="overlay"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
